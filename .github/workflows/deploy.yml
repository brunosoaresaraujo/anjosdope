name: Deploy to HostGator

on: {push: {branches: [main]}}

jobs: {ftp-deploy: {name: "FTP Deploy", runs-on: ubuntu-latest, steps: [{name: "Checkout repository", uses: "actions/checkout@v4"}, {name: "Deploy via FTP", uses: "SamKirkland/FTP-Deploy-Action@v4.3.5", with: {server: "${{ secrets.FTP_SERVER }}", username: "${{ secrets.FTP_USERNAME }}", password: "${{ secrets.FTP_PASSWORD }}", protocol: "ftps", local-dir: "./", server-dir: "./", exclude: "**/.git*\n**/.git*/**\n**/.github/**"}}]}}
